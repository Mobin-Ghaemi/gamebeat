<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خطای سرور — GameBeat</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700;900&display=swap');

        :root {
            --bg-void: #16161e;
            --bg-card: #22222e;
            --border: #35354a;
            --purple: #8b5cf6;
            --purple-light: #c084fc;
            --text-white: #eeeef5;
            --text-muted: #8888aa;
            --red: #ef4444;
            --red-light: #f87171;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-void);
            color: var(--text-white);
            font-family: 'Vazirmatn', 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .bg-glow {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }
        .bg-glow::before {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(239,68,68,0.1) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 40px 24px;
            max-width: 520px;
        }

        .error-code {
            font-size: clamp(6rem, 20vw, 9rem);
            font-weight: 900;
            line-height: 1;
            background: linear-gradient(135deg, var(--red), var(--red-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -4px;
            margin-bottom: 8px;
            animation: pulse-glow 3s ease-in-out infinite;
        }

        @keyframes pulse-glow {
            0%, 100% { filter: drop-shadow(0 0 20px rgba(239,68,68,0.3)); }
            50% { filter: drop-shadow(0 0 40px rgba(248,113,113,0.5)); }
        }

        .icon {
            font-size: 3rem;
            margin-bottom: 16px;
            display: block;
            animation: shake 4s ease-in-out infinite;
        }

        @keyframes shake {
            0%, 90%, 100% { transform: rotate(0deg); }
            92% { transform: rotate(-8deg); }
            96% { transform: rotate(8deg); }
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-white);
            margin-bottom: 12px;
        }

        p {
            color: var(--text-muted);
            font-size: 1rem;
            line-height: 1.7;
            margin-bottom: 36px;
        }

        .actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 28px;
            border-radius: 12px;
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--purple), var(--purple-light));
            color: #fff;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(139,92,246,0.4);
        }

        .btn-outline {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border);
        }
        .btn-outline:hover {
            border-color: var(--purple);
            color: var(--text-white);
            transform: translateY(-2px);
        }

        .divider {
            margin: 32px auto;
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--red), transparent);
        }

        .status-badge {
            display: inline-block;
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.3);
            color: var(--red-light);
            font-size: 0.78rem;
            padding: 4px 12px;
            border-radius: 20px;
            margin-bottom: 24px;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="container">
        <span class="icon">💥</span>
        <div class="error-code">500</div>
        <div class="divider"></div>
        <span class="status-badge">خطای داخلی سرور</span>
        <h1>یه چیزی خراب شد!</h1>
        <p>
            مشکل از ما بود، نه از تو.<br>
            تیم ما داره روش کار می‌کنه. کمی صبر کن و دوباره امتحان کن.
        </p>
        <div class="actions">
            <a href="javascript:location.reload()" class="btn btn-primary">
                🔄 تلاش دوباره
            </a>
            <a href="/" class="btn btn-outline">
                🏠 صفحه اصلی
            </a>
        </div>
    </div>
</body>
</html>
