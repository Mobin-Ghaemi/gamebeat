{% load static %}
<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}GameBeat Trading{% endblock %}</title>

  <!-- Bootstrap RTL -->
  <link rel="stylesheet" href="{% static 'vendor/css/bootstrap.rtl.min.css' %}">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="{% static 'vendor/css/fontawesome-6.5.min.css' %}">
  <!-- Vazirmatn -->
  <link rel="stylesheet" href="{% static 'vendor/css/vazirmatn-font-face.css' %}">

  <style>
    :root {
      --bg-primary: #0b0e17;
      --bg-secondary: #111827;
      --bg-card: #1a2035;
      --bg-card2: #1e2740;
      --border: #2a3448;
      --text-primary: #e8eaf0;
      --text-secondary: #8892a4;
      --text-muted: #556070;
      --accent-green: #00d68f;
      --accent-green-dim: rgba(0, 214, 143, 0.1);
      --accent-red: #ff4d6d;
      --accent-red-dim: rgba(255, 77, 109, 0.1);
      --accent-blue: #3b82f6;
      --accent-blue-dim: rgba(59, 130, 246, 0.1);
      --accent-yellow: #f59e0b;
      --accent-purple: #a855f7;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'Vazirmatn', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      direction: rtl;
    }

    /* Navbar */
    .navbar-trading {
      background: rgba(17, 24, 39, 0.95);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 12px 0;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-logo {
      font-size: 1.3rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent-green), var(--accent-blue));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-decoration: none;
    }

    .nav-link-item {
      color: var(--text-secondary) !important;
      font-size: 0.9rem;
      padding: 6px 14px !important;
      border-radius: 8px;
      transition: all 0.2s;
    }

    .nav-link-item:hover, .nav-link-item.active {
      color: var(--text-primary) !important;
      background: var(--bg-card);
    }

    /* Cards */
    .card-trading {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      box-shadow: var(--shadow);
    }

    .card-trading-sm {
      background: var(--bg-card2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
    }

    /* Buttons */
    .btn-analyze {
      background: linear-gradient(135deg, #00d68f, #00b377);
      color: #000;
      font-weight: 700;
      font-size: 1.1rem;
      border: none;
      border-radius: 12px;
      padding: 14px 40px;
      width: 100%;
      transition: all 0.3s;
      letter-spacing: 0.5px;
    }

    .btn-analyze:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0, 214, 143, 0.4);
      color: #000;
    }

    .btn-analyze:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    /* Form elements */
    .form-control-trading {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text-primary);
      padding: 14px 18px;
      font-size: 1rem;
      font-family: 'Vazirmatn', sans-serif;
      transition: border-color 0.2s;
    }

    .form-control-trading:focus {
      background: var(--bg-secondary);
      border-color: var(--accent-blue);
      color: var(--text-primary);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
      outline: none;
    }

    .form-control-trading::placeholder { color: var(--text-muted); }

    /* Interval tabs */
    .interval-tabs { display: flex; gap: 8px; flex-wrap: wrap; }

    .interval-btn {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      border-radius: 10px;
      padding: 8px 16px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Vazirmatn', sans-serif;
    }

    .interval-btn.active, .interval-btn:hover {
      background: var(--accent-blue);
      border-color: var(--accent-blue);
      color: #fff;
    }

    /* Prediction badge */
    .prediction-badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 16px 28px;
      border-radius: 16px;
      font-size: 1.6rem;
      font-weight: 800;
    }

    .prediction-badge.up {
      background: var(--accent-green-dim);
      color: var(--accent-green);
      border: 2px solid var(--accent-green);
    }

    .prediction-badge.down {
      background: var(--accent-red-dim);
      color: var(--accent-red);
      border: 2px solid var(--accent-red);
    }

    .prediction-badge.neutral {
      background: rgba(245, 158, 11, 0.1);
      color: var(--accent-yellow);
      border: 2px solid var(--accent-yellow);
    }

    /* Confidence bar */
    .confidence-bar-wrap {
      background: var(--bg-secondary);
      border-radius: 8px;
      height: 10px;
      overflow: hidden;
    }

    .confidence-bar {
      height: 100%;
      border-radius: 8px;
      transition: width 0.8s ease;
    }

    .confidence-bar.up { background: linear-gradient(90deg, #00d68f, #00b377); }
    .confidence-bar.down { background: linear-gradient(90deg, #ff4d6d, #cc2244); }
    .confidence-bar.neutral { background: linear-gradient(90deg, #f59e0b, #d97706); }

    /* Indicator chip */
    .ind-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .ind-chip.up { background: var(--accent-green-dim); color: var(--accent-green); }
    .ind-chip.down { background: var(--accent-red-dim); color: var(--accent-red); }
    .ind-chip.neutral { background: rgba(245, 158, 11, 0.1); color: var(--accent-yellow); }

    /* Agreement meter */
    .agreement-pill {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 700;
    }

    .agreement-pill.HIGH { background: var(--accent-green-dim); color: var(--accent-green); }
    .agreement-pill.MEDIUM { background: rgba(245, 158, 11, 0.15); color: var(--accent-yellow); }
    .agreement-pill.LOW { background: var(--accent-red-dim); color: var(--accent-red); }

    /* Loading spinner */
    .spinner-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(11, 14, 23, 0.85);
      z-index: 9999;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      gap: 16px;
    }

    .spinner-overlay.show { display: flex; }

    .spinner-ring {
      width: 64px;
      height: 64px;
      border: 4px solid var(--border);
      border-top-color: var(--accent-green);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Popular symbol chips */
    .symbol-chip {
      background: var(--bg-card2);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .symbol-chip:hover {
      background: var(--accent-blue-dim);
      border-color: var(--accent-blue);
      color: var(--accent-blue);
    }

    /* Stat box */
    .stat-box {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      text-align: center;
    }

    .stat-value {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text-primary);
    }

    .stat-label {
      font-size: 0.73rem;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* Price display */
    .price-display {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    /* Section title */
    .section-title {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 12px;
    }

    /* Alert */
    .alert-trading {
      background: var(--accent-red-dim);
      border: 1px solid var(--accent-red);
      color: var(--accent-red);
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 0.9rem;
    }

    /* Table */
    .table-trading {
      color: var(--text-primary);
      font-size: 0.88rem;
    }

    .table-trading th {
      background: var(--bg-card2);
      color: var(--text-muted);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      border: none;
      padding: 10px 14px;
    }

    .table-trading td {
      border-color: var(--border);
      padding: 10px 14px;
      vertical-align: middle;
    }

    .table-trading tbody tr:hover { background: var(--bg-card2); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-primary); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* Chart container */
    .chart-wrap {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      position: relative;
    }

    /* Pulse animation for live price */
    .live-dot {
      width: 8px;
      height: 8px;
      background: var(--accent-green);
      border-radius: 50%;
      display: inline-block;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    /* RSI gauge colors */
    .rsi-high { color: var(--accent-red); }
    .rsi-low { color: var(--accent-green); }
    .rsi-mid { color: var(--accent-yellow); }
  </style>

  {% block extra_css %}{% endblock %}
</head>
<body>

<!-- Loading overlay -->
<div class="spinner-overlay" id="loadingOverlay">
  <div class="spinner-ring"></div>
  <div style="color: var(--text-secondary); font-size: 0.95rem;">در حال تحلیل بازار...</div>
  <div style="color: var(--text-muted); font-size: 0.82rem;" id="loadingStatus">جمع‌آوری داده‌های Binance</div>
</div>

<!-- Navbar -->
<nav class="navbar-trading">
  <div class="container">
    <div class="d-flex align-items-center justify-content-between">
      <a href="{% url 'trading:index' %}" class="nav-logo">
        <i class="fas fa-chart-line me-2"></i>GameBeat Trading
      </a>
      <div class="d-flex gap-2">
        <a href="{% url 'trading:index' %}" class="nav-link-item {% block nav_index %}{% endblock %}">
          <i class="fas fa-search me-1"></i>تحلیل
        </a>
        <a href="{% url 'trading:history' %}" class="nav-link-item {% block nav_history %}{% endblock %}">
          <i class="fas fa-history me-1"></i>تاریخچه
        </a>
      </div>
    </div>
  </div>
</nav>

{% block content %}{% endblock %}

<!-- Bootstrap JS -->
<script src="{% static 'vendor/js/bootstrap.bundle.min.js' %}"></script>
<!-- Chart.js -->
<script src="{% static 'vendor/js/chart.umd.min.js' %}"></script>
<!-- Luxon for time -->
<script src="{% static 'vendor/js/luxon.min.js' %}"></script>

{% block extra_js %}{% endblock %}
</body>
</html>
