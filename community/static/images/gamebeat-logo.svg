<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>

    <!-- ── Gradients ── -->
    <radialGradient id="bg" cx="50%" cy="35%" r="65%">
      <stop offset="0%"   stop-color="#1e0404"/>
      <stop offset="100%" stop-color="#060101"/>
    </radialGradient>

    <linearGradient id="ecgGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#dc2626" stop-opacity="0"/>
      <stop offset="18%"  stop-color="#dc2626"/>
      <stop offset="44%"  stop-color="#fca5a5"/>
      <stop offset="56%"  stop-color="#fca5a5"/>
      <stop offset="82%"  stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#dc2626" stop-opacity="0"/>
    </linearGradient>

    <!-- ── Filters ── -->
    <filter id="ecgGlow" x="-30%" y="-200%" width="160%" height="600%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="heartGlow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="9" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="dotGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="textGlow" x="-8%" y="-45%" width="116%" height="190%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

  </defs>

  <!-- ══════════════════════════════════
       BACKGROUND
  ══════════════════════════════════ -->
  <rect width="400" height="400" rx="34" fill="url(#bg)"/>

  <!-- outer border -->
  <rect width="400" height="400" rx="34" fill="none"
        stroke="#dc2626" stroke-width="1.5" stroke-opacity="0.38"/>
  <!-- inner frame -->
  <rect x="9" y="9" width="382" height="382" rx="27" fill="none"
        stroke="#dc2626" stroke-width="0.5" stroke-opacity="0.12"/>

  <!-- ── Corner pixel-grid dots ── -->
  <g fill="#ef4444" opacity="0.22">
    <!-- TL -->
    <circle cx="28" cy="26" r="2.8"/><circle cx="42" cy="26" r="2.8"/><circle cx="56" cy="26" r="2.8"/>
    <circle cx="28" cy="40" r="2.8"/><circle cx="42" cy="40" r="2.8"/><circle cx="56" cy="40" r="2.8"/>
    <!-- TR -->
    <circle cx="344" cy="26" r="2.8"/><circle cx="358" cy="26" r="2.8"/><circle cx="372" cy="26" r="2.8"/>
    <circle cx="344" cy="40" r="2.8"/><circle cx="358" cy="40" r="2.8"/><circle cx="372" cy="40" r="2.8"/>
    <!-- BL -->
    <circle cx="28" cy="360" r="2.8"/><circle cx="42" cy="360" r="2.8"/><circle cx="56" cy="360" r="2.8"/>
    <circle cx="28" cy="374" r="2.8"/><circle cx="42" cy="374" r="2.8"/><circle cx="56" cy="374" r="2.8"/>
    <!-- BR -->
    <circle cx="344" cy="360" r="2.8"/><circle cx="358" cy="360" r="2.8"/><circle cx="372" cy="360" r="2.8"/>
    <circle cx="344" cy="374" r="2.8"/><circle cx="358" cy="374" r="2.8"/><circle cx="372" cy="374" r="2.8"/>
  </g>

  <!-- ══════════════════════════════════
       PIXEL HEART
       Grid 5×5, pixel=13px, stride=14
       Center x=200  →  col0=165
       Top y=48       →  rows: 48,62,76,90,104
  ══════════════════════════════════ -->
  <g filter="url(#heartGlow)">
    <!-- Row 0: col1, col3 (top bumps) -->
    <rect x="179" y="48"  width="13" height="13" rx="2" fill="#ef4444"/>
    <rect x="207" y="48"  width="13" height="13" rx="2" fill="#ef4444"/>
    <!-- Row 1: all 5 (col0–col4) — light highlights on col1,col3 -->
    <rect x="165" y="62"  width="13" height="13" rx="2" fill="#ef4444"/>
    <rect x="179" y="62"  width="13" height="13" rx="2" fill="#fca5a5"/>
    <rect x="193" y="62"  width="13" height="13" rx="2" fill="#ef4444"/>
    <rect x="207" y="62"  width="13" height="13" rx="2" fill="#fca5a5"/>
    <rect x="221" y="62"  width="13" height="13" rx="2" fill="#ef4444"/>
    <!-- Row 2: all 5 -->
    <rect x="165" y="76"  width="13" height="13" rx="2" fill="#ef4444"/>
    <rect x="179" y="76"  width="13" height="13" rx="2" fill="#ef4444"/>
    <rect x="193" y="76"  width="13" height="13" rx="2" fill="#ef4444"/>
    <rect x="207" y="76"  width="13" height="13" rx="2" fill="#ef4444"/>
    <rect x="221" y="76"  width="13" height="13" rx="2" fill="#ef4444"/>
    <!-- Row 3: col1,col2,col3 -->
    <rect x="179" y="90"  width="13" height="13" rx="2" fill="#ef4444"/>
    <rect x="193" y="90"  width="13" height="13" rx="2" fill="#ef4444"/>
    <rect x="207" y="90"  width="13" height="13" rx="2" fill="#ef4444"/>
    <!-- Row 4: col2 (tip) — bottom of heart at y=117 -->
    <rect x="193" y="104" width="13" height="13" rx="2" fill="#ef4444"/>
  </g>

  <!-- ══════════════════════════════════
       ECG / HEARTBEAT LINE
       Baseline y=225
       QRS complex:
         P wave: (140,208)→(150,225)
         Q dip:  (162,238)
         R peak: (196,122)  ← just below heart tip (117)
         S dip:  (210,270)
         Return: (224,225)
  ══════════════════════════════════ -->
  <path d="M22,225 L122,225
           L140,208 L150,225
           L162,238 L196,122 L210,270 L224,225
           L378,225"
        stroke="url(#ecgGrad)"
        stroke-width="4" fill="none"
        stroke-linecap="round" stroke-linejoin="round"
        filter="url(#ecgGlow)"/>

  <!-- Bright connection dot at R-peak (links ECG to heart) -->
  <circle cx="196" cy="122" r="6" fill="#fca5a5" filter="url(#dotGlow)"/>

  <!-- ══════════════════════════════════
       CONTROLLER ICONS (2D game style)
       Tiny D-pad left side, ABXY right
  ══════════════════════════════════ -->
  <!-- D-pad (simplified, left of ECG baseline) -->
  <g fill="#dc2626" opacity="0.30">
    <!-- horizontal bar -->
    <rect x="44" y="221" width="24" height="8" rx="2"/>
    <!-- vertical bar -->
    <rect x="52" y="213" width="8" height="24" rx="2"/>
  </g>

  <!-- ABXY buttons (right of ECG baseline) -->
  <g fill="#dc2626" opacity="0.30">
    <circle cx="332" cy="217" r="5"/><!-- Y -->
    <circle cx="346" cy="225" r="5"/><!-- B -->
    <circle cx="332" cy="233" r="5"/><!-- A -->
    <circle cx="318" cy="225" r="5"/><!-- X -->
  </g>

  <!-- ══════════════════════════════════
       TEXT
  ══════════════════════════════════ -->
  <!-- GAME -->
  <text x="200" y="308"
        text-anchor="middle"
        fill="#ef4444"
        font-size="52" font-weight="900"
        font-family="Impact, 'Arial Black', 'Helvetica Neue', sans-serif"
        letter-spacing="8"
        filter="url(#textGlow)">GAME</text>

  <!-- BEAT (slightly smaller, below) -->
  <text x="200" y="348"
        text-anchor="middle"
        fill="#dc2626"
        font-size="28" font-weight="900"
        font-family="Impact, 'Arial Black', sans-serif"
        letter-spacing="20"
        opacity="0.80">BEAT</text>

  <!-- ══════════════════════════════════
       BOTTOM DECORATION
  ══════════════════════════════════ -->
  <!-- Separator line -->
  <line x1="112" y1="364" x2="288" y2="364"
        stroke="#dc2626" stroke-width="0.8" stroke-opacity="0.28"/>
  <circle cx="112" cy="364" r="2.5" fill="#dc2626" opacity="0.38"/>
  <circle cx="200" cy="364" r="2"   fill="#dc2626" opacity="0.45"/>
  <circle cx="288" cy="364" r="2.5" fill="#dc2626" opacity="0.38"/>

  <!-- HP bar (3 filled, 3 empty — like 3/6 lives) -->
  <g>
    <circle cx="158" cy="382" r="5" fill="#ef4444" opacity="0.90" filter="url(#dotGlow)"/>
    <circle cx="176" cy="382" r="5" fill="#ef4444" opacity="0.90" filter="url(#dotGlow)"/>
    <circle cx="194" cy="382" r="5" fill="#ef4444" opacity="0.90" filter="url(#dotGlow)"/>
    <circle cx="212" cy="382" r="5" fill="none" stroke="#dc2626" stroke-width="1.5" opacity="0.28"/>
    <circle cx="230" cy="382" r="5" fill="none" stroke="#dc2626" stroke-width="1.5" opacity="0.28"/>
    <circle cx="248" cy="382" r="5" fill="none" stroke="#dc2626" stroke-width="1.5" opacity="0.28"/>
  </g>

</svg>
