<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" width="720" height="200">
  <defs>

    <radialGradient id="bg2" cx="35%" cy="50%" r="75%">
      <stop offset="0%"   stop-color="#1e0404"/>
      <stop offset="100%" stop-color="#060101"/>
    </radialGradient>

    <linearGradient id="ecg2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#dc2626" stop-opacity="0"/>
      <stop offset="4%"   stop-color="#dc2626"/>
      <stop offset="38%"  stop-color="#fca5a5"/>
      <stop offset="62%"  stop-color="#fca5a5"/>
      <stop offset="92%"  stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#dc2626" stop-opacity="0"/>
    </linearGradient>

    <filter id="eg2" x="-10%" y="-400%" width="120%" height="1000%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="dg2" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

  </defs>

  <!-- ── Background ── -->
  <rect width="720" height="200" rx="20" fill="url(#bg2)"/>
  <rect width="720" height="200" rx="20" fill="none" stroke="#dc2626" stroke-width="1.2" stroke-opacity="0.38"/>
  <rect x="5" y="5" width="710" height="190" rx="16" fill="none" stroke="#dc2626" stroke-width="0.4" stroke-opacity="0.10"/>

  <!-- ── Corner dots ── -->
  <g fill="#ef4444" opacity="0.20">
    <circle cx="20" cy="17" r="2"/><circle cx="29" cy="17" r="2"/>
    <circle cx="20" cy="26" r="2"/><circle cx="29" cy="26" r="2"/>
  </g>
  <g fill="#ef4444" opacity="0.20">
    <circle cx="691" cy="17" r="2"/><circle cx="700" cy="17" r="2"/>
    <circle cx="691" cy="26" r="2"/><circle cx="700" cy="26" r="2"/>
  </g>
  <g fill="#ef4444" opacity="0.20">
    <circle cx="20" cy="174" r="2"/><circle cx="29" cy="174" r="2"/>
    <circle cx="20" cy="183" r="2"/><circle cx="29" cy="183" r="2"/>
  </g>
  <g fill="#ef4444" opacity="0.20">
    <circle cx="691" cy="174" r="2"/><circle cx="700" cy="174" r="2"/>
    <circle cx="691" cy="183" r="2"/><circle cx="700" cy="183" r="2"/>
  </g>

  <!-- ══════════════════════════════════
       FULL ECG / HEARTBEAT LINE
       Zone x=16 – 490, baseline y=100
       P wave ~x=130, QRS spike x=250, T wave x=390
  ══════════════════════════════════ -->
  <path d="M 16,100
           L 106,100
           L 120,86 L 134,100
           L 148,112 L 250,18 L 334,170 L 352,100
           L 378,100
           L 390,82 L 408,100
           L 490,100"
        stroke="url(#ecg2)"
        stroke-width="3.2" fill="none"
        stroke-linecap="round" stroke-linejoin="round"
        filter="url(#eg2)"/>

  <!-- Bright dot at ECG peak -->
  <circle cx="250" cy="18" r="5.5" fill="#fca5a5" filter="url(#dg2)"/>

  <!-- Soft divider -->
  <line x1="508" y1="24" x2="508" y2="176"
        stroke="#dc2626" stroke-width="0.8" stroke-opacity="0.22"/>

  <!-- ══════════════════════════════════
       WHITE 2D FLAT CONTROLLER
       Zone x=516 – 704, center (610, 100)
       Top (shoulders) y=51, bottom (grips) y=160
  ══════════════════════════════════ -->

  <!-- Shoulder buttons -->
  <rect x="524" y="51" width="52" height="16" rx="8"  fill="#e0e0f0"/>
  <rect x="628" y="51" width="52" height="16" rx="8"  fill="#e0e0f0"/>

  <!-- Grip areas -->
  <rect x="516" y="92"  width="58" height="68" rx="12" fill="#d4d4e8"/>
  <rect x="630" y="92"  width="58" height="68" rx="12" fill="#d4d4e8"/>

  <!-- Main body -->
  <rect x="524" y="66"  width="156" height="60" rx="15" fill="#ededf8"/>

  <!-- L / R labels -->
  <text x="550" y="63" text-anchor="middle" fill="#1a1a2e"
        font-size="11" font-weight="900"
        font-family="Impact,'Arial Black',sans-serif">L</text>
  <text x="654" y="63" text-anchor="middle" fill="#1a1a2e"
        font-size="11" font-weight="900"
        font-family="Impact,'Arial Black',sans-serif">R</text>

  <!-- D-pad (center x=552, y=100) -->
  <rect x="536" y="96"  width="32" height="8"  rx="2" fill="#1a1a2e"/>
  <rect x="548" y="84"  width="8"  height="32" rx="2" fill="#1a1a2e"/>
  <rect x="548" y="96"  width="8"  height="8"  rx="1" fill="#2e2e44"/>

  <!-- ABXY buttons (center x=664, y=100) -->
  <circle cx="664" cy="84"  r="9"  fill="#dc2626"/>
  <circle cx="680" cy="100" r="9"  fill="#ef4444"/>
  <circle cx="664" cy="116" r="9"  fill="#dc2626"/>
  <circle cx="648" cy="100" r="9"  fill="#b91c1c"/>
  <text x="664" y="88"  text-anchor="middle" fill="white"
        font-size="9" font-weight="900" font-family="Impact,sans-serif">Y</text>
  <text x="680" y="104" text-anchor="middle" fill="white"
        font-size="9" font-weight="900" font-family="Impact,sans-serif">B</text>
  <text x="664" y="120" text-anchor="middle" fill="white"
        font-size="9" font-weight="900" font-family="Impact,sans-serif">A</text>
  <text x="648" y="104" text-anchor="middle" fill="#fca5a5"
        font-size="9" font-weight="900" font-family="Impact,sans-serif">X</text>

  <!-- Select / Start -->
  <rect x="584" y="97"  width="14" height="6" rx="3" fill="#a0a0c0"/>
  <rect x="606" y="97"  width="14" height="6" rx="3" fill="#a0a0c0"/>

  <!-- Center home -->
  <circle cx="602" cy="100" r="10" fill="#d8d8ec"/>
  <circle cx="602" cy="100" r="5"  fill="#c4c4dc"/>

  <!-- Thumbstick pads -->
  <circle cx="547" cy="134" r="17" fill="#c4c4dc"/>
  <circle cx="547" cy="134" r="10" fill="#b4b4cc"/>
  <circle cx="657" cy="134" r="17" fill="#c4c4dc"/>
  <circle cx="657" cy="134" r="10" fill="#b4b4cc"/>

  <!-- HP dots (bottom right, above corner) -->
  <g>
    <circle cx="532" cy="174" r="4" fill="#ef4444" opacity="0.85" filter="url(#dg2)"/>
    <circle cx="544" cy="174" r="4" fill="#ef4444" opacity="0.85" filter="url(#dg2)"/>
    <circle cx="556" cy="174" r="4" fill="#ef4444" opacity="0.85" filter="url(#dg2)"/>
    <circle cx="568" cy="174" r="4" fill="none" stroke="#dc2626" stroke-width="1.2" opacity="0.28"/>
    <circle cx="580" cy="174" r="4" fill="none" stroke="#dc2626" stroke-width="1.2" opacity="0.28"/>
  </g>

</svg>
