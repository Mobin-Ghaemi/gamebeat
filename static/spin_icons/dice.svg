<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- die body -->
  <rect fill="#f8f8ff" x="8" y="8" width="48" height="48" rx="10"/>
  <!-- die border -->
  <rect fill="none" stroke="#c4b5fd" stroke-width="2" x="8" y="8" width="48" height="48" rx="10"/>
  <!-- top face highlight -->
  <rect fill="rgba(255,255,255,0.6)" x="10" y="10" width="44" height="14" rx="8"/>
  <!-- dots - purple -->
  <!-- top-left -->
  <circle fill="#7c3aed" cx="21" cy="21" r="4"/>
  <!-- top-right -->
  <circle fill="#7c3aed" cx="43" cy="21" r="4"/>
  <!-- middle-left -->
  <circle fill="#7c3aed" cx="21" cy="32" r="4"/>
  <!-- center -->
  <circle fill="#7c3aed" cx="32" cy="32" r="4"/>
  <!-- middle-right -->
  <circle fill="#7c3aed" cx="43" cy="32" r="4"/>
  <!-- bottom-left -->
  <circle fill="#7c3aed" cx="21" cy="43" r="4"/>
  <!-- bottom-right -->
  <circle fill="#7c3aed" cx="43" cy="43" r="4"/>
</svg>
